<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Unity Web Player | Sepeda Motor</title>
    <link rel="shortcut icon" href="TemplateData/favicon.ico">
    <link rel="stylesheet" href="TemplateData/style.css">
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { background: #0f0520; overflow: hidden; width: 100vw; height: 100vh; }
      #unity-container { width: 100%; height: 100%; }
      #unity-canvas { width: 100% !important; height: 100% !important; }
      #unity-loading-bar {
        position: fixed; top: 50%; left: 50%;
        transform: translate(-50%, -50%); z-index: 200;
      }
    </style>
  </head>
  <body>
    <div id="unity-container">
      <canvas id="unity-canvas" tabindex="0"></canvas>
      <div id="unity-loading-bar">
        <div id="unity-logo"></div>
        <div id="unity-progress-bar-empty">
          <div id="unity-progress-bar-full"></div>
        </div>
      </div>
      <div id="unity-warning"></div>
    </div>

    <script>
      var canvas = document.querySelector("#unity-canvas");

      function unityShowBanner(msg, type) {
        var wb = document.querySelector("#unity-warning");
        var div = document.createElement('div');
        div.innerHTML = msg;
        wb.appendChild(div);
        if (type == 'error') div.style = 'background:red;padding:10px;';
        else if (type == 'warning') {
          div.style = 'background:yellow;padding:10px;';
          setTimeout(() => { wb.removeChild(div); }, 5000);
        }
        wb.style.display = wb.children.length ? 'block' : 'none';
      }

      var buildUrl = "Build";
      var config = {
        dataUrl:            buildUrl + "/Modul1.data",
        frameworkUrl:       buildUrl + "/Modul1.framework.js",
        codeUrl:            buildUrl + "/Modul1.wasm",
        streamingAssetsUrl: "StreamingAssets",
        companyName:        "Akal Budi Bertumbuh",
        productName:        "Sepeda Motor",
        productVersion:     "0.1.0",
        showBanner:         unityShowBanner,
      };

      document.querySelector("#unity-loading-bar").style.display = "block";

      var script = document.createElement("script");
      script.src = buildUrl + "/Modul1.loader.js";
      script.onload = () => {
        createUnityInstance(canvas, config, (progress) => {
          document.querySelector("#unity-progress-bar-full").style.width = 100 * progress + "%";
        }).then((unityInstance) => {
          document.querySelector("#unity-loading-bar").style.display = "none";
          window.unityInstance = unityInstance;
          canvas.focus();
          canvas.addEventListener('mouseenter', () => canvas.focus());
        }).catch((msg) => alert(msg));
      };
      document.body.appendChild(script);
    </script>
  </body>
</html>
